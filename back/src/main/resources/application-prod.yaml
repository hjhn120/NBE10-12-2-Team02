spring:
  application:
    name: back
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

springdoc:
  default-produces-media-type: application/json;charset=UTF-8

custom:
  jwt:
    accessToken:
      secret: ${JWT_ACCESS_SECRET}
      expirationSeconds: 600
    refreshToken:
      secret: ${JWT_REFRESH_SECRET}
      expirationSeconds: 604800
    blacklist:
      grace-seconds: 60
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  redis:
    refresh-token:
      prefix: "auth:refresh:"
      index-prefix: "auth:refresh:index:"

app:
  rate-limit:
    seat-status:
      capacity: 5
      refill-tokens: 5
      refill-seconds: 1
      expire-after-access-minutes: 10
      maximum-size: 10000